<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where Is Siva?</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9973;</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-deep: #060a12;
    --bg-card: #0c1220;
    --bg-card-hover: #111828;
    --border: #1a2540;
    --text-primary: #e2e8f0;
    --text-secondary: #8494a7;
    --text-dim: #4a5568;
    --accent-blue: #3b82f6;
    --accent-cyan: #22d3ee;
    --accent-amber: #f59e0b;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --track-color: #3b82f6;
    --route-color: #2a3a5c;
    --glow: 0 0 20px rgba(59, 130, 246, 0.15);
    --chart-bar: rgba(59, 130, 246, 0.6);
    --chart-bar-border: rgba(59, 130, 246, 0.8);
    --chart-tick: #4a5568;
    --chart-grid: #1a254033;
    --chart-tooltip-bg: #0c1220;
    --chart-tooltip-border: #1a2540;
  }

  [data-theme="light"] {
    --bg-deep: #f0f2f5;
    --bg-card: #ffffff;
    --bg-card-hover: #f8f9fa;
    --border: #dadce0;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --text-dim: #9aa0a6;
    --accent-blue: #1a73e8;
    --accent-cyan: #0d7377;
    --accent-amber: #e37400;
    --accent-green: #0d652d;
    --accent-red: #c5221f;
    --track-color: #1a73e8;
    --route-color: #bdc1c6;
    --glow: 0 2px 8px rgba(0, 0, 0, 0.08);
    --chart-bar: rgba(26, 115, 232, 0.5);
    --chart-bar-border: rgba(26, 115, 232, 0.7);
    --chart-tick: #5f6368;
    --chart-grid: #dadce033;
    --chart-tooltip-bg: #ffffff;
    --chart-tooltip-border: #dadce0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0a1020 0%, var(--bg-deep) 100%);
  }
  [data-theme="light"] .header {
    background: linear-gradient(180deg, #ffffff 0%, var(--bg-deep) 100%);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-primary);
  }
  .header .route-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-green);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
  }
  .utc-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* Main Layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto auto;
    gap: 16px;
    padding: 16px 24px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
  }
  .card-body { padding: 16px; }

  /* Map */
  .map-container {
    grid-row: 1;
    grid-column: 1;
    min-height: 480px;
  }
  #map {
    width: 100%;
    height: 100%;
    min-height: 480px;
    border-radius: 11px;
  }
  .leaflet-container { background: #0a0e17; }

  /* Right Panels */
  .right-panels {
    grid-row: 1;
    grid-column: 2;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Progress */
  .progress-bar-container {
    width: 100%;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 12px 0;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
    border-radius: 4px;
    transition: width 1s ease;
  }
  .progress-pct {
    font-size: 32px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-cyan);
  }
  .progress-pct span {
    font-size: 16px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* Stat rows */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .stat-value.highlight { color: var(--accent-amber); }
  .stat-unit {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 4px;
  }

  /* Large stat */
  .stat-large {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .stat-large.speed { color: var(--accent-blue); }
  .stat-large .unit {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-secondary);
  }

  /* Compass */
  .compass {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }
  .compass-ring {
    width: 56px;
    height: 56px;
    border: 2px solid var(--border);
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .compass-needle {
    width: 2px;
    height: 20px;
    background: var(--accent-blue);
    border-radius: 1px;
    transform-origin: bottom center;
    position: absolute;
    top: 6px;
  }
  .compass-labels {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .compass-labels .degrees { color: var(--text-primary); }
  .compass-labels .direction { color: var(--accent-cyan); font-weight: 600; }

  /* Coordinates */
  .coord {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .coord-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 2px;
  }
  .last-update {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .last-update .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-green);
  }

  /* Bottom row */
  .bottom-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* Messages */
  .messages-list {
    max-height: 260px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .message-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .message-item:last-child { border-bottom: none; }
  .message-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .message-text {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.5;
  }

  /* Chart */
  .chart-container {
    position: relative;
    height: 200px;
    padding: 8px;
  }

  /* Loading state */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-dim);
    gap: 12px;
  }
  .loading-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* No data state */
  .no-data {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--text-dim);
    text-align: center;
    gap: 8px;
  }
  .no-data-icon { font-size: 32px; }
  .no-data-text { font-size: 14px; }
  .no-data-sub { font-size: 12px; color: var(--text-dim); }

  /* Responsive */
  @media (max-width: 900px) {
    .main {
      grid-template-columns: 1fr;
      padding: 12px;
    }
    .right-panels { grid-row: auto; grid-column: 1; }
    .bottom-row { grid-template-columns: 1fr; }
    .header {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    .header-right { align-self: flex-end; }
  }

  /* Leaflet popup styling */
  .leaflet-popup-content-wrapper {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--glow);
  }
  .leaflet-popup-tip { background: var(--bg-card); }
  .leaflet-popup-content {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    margin: 8px 12px;
  }

  /* Light mode map background */
  [data-theme="light"] .leaflet-container { background: #e8eaed; }

  /* Theme toggle */
  .theme-toggle {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 16px;
    line-height: 1;
    transition: background 0.2s;
  }
  .theme-toggle:hover { background: var(--bg-card-hover); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>WHERE IS SIVA?</h1>
    <span class="route-label" id="route-label">Loading...</span>
  </div>
  <div class="header-right">
    <div class="live-badge" id="live-badge">
      <div class="live-dot"></div>
      <span>LIVE</span>
    </div>
    <div class="utc-time" id="utc-time"></div>
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark theme">&#9788;</button>
  </div>
</div>

<div class="main">
  <!-- Map -->
  <div class="card map-container">
    <div id="map"></div>
  </div>

  <!-- Right Panels -->
  <div class="right-panels">

    <!-- Voyage Progress -->
    <div class="card">
      <div class="card-header">Voyage Progress</div>
      <div class="card-body">
        <div class="progress-pct"><span id="progress-pct">--</span><span>%</span></div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
        </div>
        <div class="stat-row">
          <span class="stat-label">Completed</span>
          <span class="stat-value"><span id="dist-completed">--</span><span class="stat-unit">km</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Remaining</span>
          <span class="stat-value"><span id="dist-remaining">--</span><span class="stat-unit">km</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Total Route</span>
          <span class="stat-value"><span id="dist-total">--</span><span class="stat-unit">km</span></span>
        </div>
      </div>
    </div>

    <!-- Speed & ETA -->
    <div class="card">
      <div class="card-header">Speed & ETA</div>
      <div class="card-body">
        <div style="display: flex; gap: 20px; margin-bottom: 12px;">
          <div>
            <div class="stat-large speed"><span id="current-speed">--</span> <span class="unit">km/h</span></div>
            <div style="font-size: 11px; color: var(--text-dim);">Current</div>
          </div>
          <div>
            <div class="stat-large" style="color: var(--text-secondary);"><span id="avg-speed">--</span> <span class="unit">km/h</span></div>
            <div style="font-size: 11px; color: var(--text-dim);">Average</div>
          </div>
        </div>
        <div class="stat-row">
          <span class="stat-label">ETA</span>
          <span class="stat-value highlight" id="eta">--</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Days Remaining</span>
          <span class="stat-value" id="days-remaining">--</span>
        </div>
      </div>
    </div>

    <!-- Position -->
    <div class="card">
      <div class="card-header">Position</div>
      <div class="card-body">
        <a id="gmaps-link" href="#" target="_blank" rel="noopener" style="display: flex; gap: 16px; margin-bottom: 8px; text-decoration: none; color: inherit;" title="Open in Google Maps">
          <div>
            <div class="coord-label">LAT</div>
            <div class="coord" id="lat">--</div>
          </div>
          <div>
            <div class="coord-label">LON</div>
            <div class="coord" id="lon">--</div>
          </div>
          <div style="display: flex; align-items: center; margin-left: auto; opacity: 0.5; font-size: 12px;">&#x1F517;</div>
        </a>
        <div class="compass">
          <div class="compass-ring">
            <div class="compass-needle" id="compass-needle" style="transform: rotate(0deg)"></div>
          </div>
          <div class="compass-labels">
            <div class="degrees" id="heading-degrees">--</div>
            <div class="direction" id="heading-compass">--</div>
          </div>
        </div>
        <div class="last-update">
          <div class="dot" id="update-dot"></div>
          <span id="last-update-text">Waiting for data...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Row -->
  <div class="bottom-row">
    <!-- Messages -->
    <div class="card">
      <div class="card-header">Check-in Messages</div>
      <div class="card-body">
        <div class="messages-list" id="messages-list">
          <div class="loading">
            <div class="loading-spinner"></div>
            <span>Waiting for messages...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Daily Distance Chart -->
    <div class="card">
      <div class="card-header">Daily Distance</div>
      <div class="card-body">
        <div class="chart-container">
          <canvas id="daily-chart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // --- Configuration ---
  var IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  var REFRESH_INTERVAL = IS_LOCAL ? 30000 : 300000;
  var initialBoundsFit = false;

  // --- UTC Clock ---
  function updateClock() {
    var now = new Date();
    document.getElementById('utc-time').textContent =
      now.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
  }
  setInterval(updateClock, 1000);
  updateClock();

  // --- Theme ---
  var TILES = {
    dark: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    light: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  };
  var storedTheme = localStorage.getItem('theme');
  var currentTheme = (storedTheme === 'light' || storedTheme === 'dark') ? storedTheme : 'dark';
  if (currentTheme === 'light') document.documentElement.setAttribute('data-theme', 'light');

  var toggleBtn = document.getElementById('theme-toggle');
  toggleBtn.textContent = currentTheme === 'dark' ? '\u2600' : '\u263E';
  toggleBtn.addEventListener('click', function() {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', currentTheme === 'light' ? 'light' : '');
    if (currentTheme === 'dark') document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('theme', currentTheme);
    toggleBtn.textContent = currentTheme === 'dark' ? '\u2600' : '\u263E';
    swapTiles();
    if (dailyChart) rebuildChart();
    if (lastData) updateDashboard(lastData);
  });

  // --- Map Setup ---
  var map = L.map('map', {
    center: [32, -50],
    zoom: 4,
    zoomControl: true,
    attributionControl: false,
  });

  var tileLayer = L.tileLayer(TILES[currentTheme], {
    maxZoom: 18,
    subdomains: 'abcd',
  }).addTo(map);

  function swapTiles() {
    map.removeLayer(tileLayer);
    tileLayer = L.tileLayer(TILES[currentTheme], {
      maxZoom: 18,
      subdomains: 'abcd',
    }).addTo(map);
  }

  var routeLine = null;
  var trackLine = null;
  var positionMarker = null;
  var waypointMarkers = [];
  var lastData = null;

  function getBoatIcon() {
    var isLight = currentTheme === 'light';
    return L.divIcon({
      className: '',
      html: '<div style="width:16px;height:16px;background:' + (isLight ? '#1a73e8' : '#3b82f6') +
        ';border:2px solid ' + (isLight ? '#ffffff' : '#e2e8f0') +
        ';border-radius:50%;box-shadow:0 0 12px rgba(' + (isLight ? '26,115,232' : '59,130,246') +
        ',0.6),0 0 24px rgba(' + (isLight ? '26,115,232' : '59,130,246') + ',0.3);"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8],
    });
  }

  function waypointIcon(label) {
    var isLight = currentTheme === 'light';
    return L.divIcon({
      className: '',
      html: '<div style="display:flex;align-items:center;gap:6px;">' +
        '<div style="width:10px;height:10px;background:' + (isLight ? '#e37400' : '#f59e0b') +
        ';border:2px solid ' + (isLight ? '#ffffff' : '#1a2540') + ';border-radius:50%;"></div>' +
        '<span style="font-family:Inter,sans-serif;font-size:11px;color:' + (isLight ? '#5f6368' : '#8494a7') +
        ';white-space:nowrap;text-shadow:0 1px 3px ' + (isLight ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.8)') +
        ';">' + escapeHtml(label) + '</span></div>',
      iconSize: [100, 16],
      iconAnchor: [5, 8],
    });
  }

  // --- Chart Setup ---
  var dailyChart = null;
  var chartCtx = document.getElementById('daily-chart').getContext('2d');
  var chartLabels = [];
  var chartValues = [];

  function getChartColors() {
    var s = getComputedStyle(document.documentElement);
    return {
      bar: s.getPropertyValue('--chart-bar').trim(),
      barBorder: s.getPropertyValue('--chart-bar-border').trim(),
      tick: s.getPropertyValue('--chart-tick').trim(),
      grid: s.getPropertyValue('--chart-grid').trim(),
      tooltipBg: s.getPropertyValue('--chart-tooltip-bg').trim(),
      tooltipBorder: s.getPropertyValue('--chart-tooltip-border').trim(),
      border: s.getPropertyValue('--border').trim(),
    };
  }

  function rebuildChart() {
    if (chartLabels.length > 0) initChart(chartLabels, chartValues);
  }

  function initChart(labels, values) {
    chartLabels = labels;
    chartValues = values;
    if (dailyChart) dailyChart.destroy();
    var c = getChartColors();
    dailyChart = new Chart(chartCtx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          data: values,
          backgroundColor: c.bar,
          borderColor: c.barBorder,
          borderWidth: 1,
          borderRadius: 3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: c.tooltipBg,
            borderColor: c.tooltipBorder,
            borderWidth: 1,
            titleColor: currentTheme === 'light' ? '#202124' : '#e2e8f0',
            bodyColor: currentTheme === 'light' ? '#202124' : '#e2e8f0',
            titleFont: { family: 'JetBrains Mono' },
            bodyFont: { family: 'JetBrains Mono' },
            callbacks: {
              label: function(ctx) { return ctx.parsed.y + ' km'; }
            }
          }
        },
        scales: {
          x: {
            ticks: { color: c.tick, font: { family: 'JetBrains Mono', size: 10 }, maxRotation: 45 },
            grid: { display: false },
            border: { color: c.border },
          },
          y: {
            ticks: {
              color: c.tick,
              font: { family: 'JetBrains Mono', size: 10 },
              callback: function(v) { return v + ' km'; }
            },
            grid: { color: c.grid },
            border: { color: c.border },
          }
        }
      }
    });
  }

  // --- Data Fetching ---
  async function fetchData() {
    try {
      var resp;
      if (IS_LOCAL) {
        resp = await fetch('/api/all');
      } else {
        resp = await fetch('data.json');
      }
      var data = await resp.json();
      updateDashboard(data);
    } catch (err) {
      console.error('Failed to fetch data:', err);
    }
  }

  // --- Dashboard Update ---
  function updateDashboard(data) {
    lastData = data;
    var stats = data.stats;
    var track = data.track;
    var messages = data.messages;
    var waypoints = data.waypoints;
    var route = data.route;

    // Header
    document.getElementById('route-label').textContent =
      route.origin + ' \u2192 ' + route.destination;

    // --- Voyage Progress ---
    var v = stats.voyage;
    document.getElementById('progress-pct').textContent = v.progress_pct.toFixed(1);
    document.getElementById('progress-bar').style.width = v.progress_pct + '%';
    document.getElementById('dist-completed').textContent = formatNum(v.distance_completed_km);
    document.getElementById('dist-remaining').textContent = formatNum(v.distance_remaining_km);
    document.getElementById('dist-total').textContent = formatNum(v.total_route_km);

    // --- Speed & ETA ---
    document.getElementById('current-speed').textContent = stats.speed.current_kmh.toFixed(1);
    document.getElementById('avg-speed').textContent = stats.speed.average_kmh.toFixed(1);
    document.getElementById('eta').textContent = stats.eta.estimated_arrival
      ? formatDate(stats.eta.estimated_arrival) : '--';
    document.getElementById('days-remaining').textContent = stats.eta.days_remaining
      ? stats.eta.days_remaining.toFixed(1) : '--';

    // --- Position ---
    var pos = stats.current_position;
    document.getElementById('lat').textContent = formatCoord(pos.lat, 'N', 'S');
    document.getElementById('lon').textContent = formatCoord(pos.lon, 'E', 'W');
    document.getElementById('gmaps-link').href = 'https://www.google.com/maps?q=' + pos.lat + ',' + pos.lon;
    document.getElementById('heading-degrees').textContent = pos.heading.toFixed(1) + '\u00B0';
    document.getElementById('heading-compass').textContent = pos.heading_compass;
    document.getElementById('compass-needle').style.transform = 'rotate(' + pos.heading + 'deg)';

    // Last update + LIVE badge staleness
    if (pos.last_update) {
      var ago = timeAgo(pos.last_update);
      document.getElementById('last-update-text').textContent = 'Last update: ' + ago;
      var dot = document.getElementById('update-dot');
      var mins = (Date.now() - new Date(pos.last_update).getTime()) / 60000;
      dot.style.background = mins < 15 ? 'var(--accent-green)' :
                             mins < 60 ? 'var(--accent-amber)' : 'var(--accent-red)';
      // Update header LIVE badge based on freshness
      var badge = document.getElementById('live-badge');
      var badgeDot = badge.querySelector('.live-dot');
      var badgeText = badge.querySelector('span:last-child');
      if (mins < 30) {
        badgeDot.style.background = 'var(--accent-green)';
        badgeText.textContent = 'LIVE';
      } else if (mins < 120) {
        badgeDot.style.background = 'var(--accent-amber)';
        badgeText.textContent = ago.toUpperCase();
      } else {
        badgeDot.style.background = 'var(--accent-red)';
        badgeDot.style.animation = 'none';
        badgeText.textContent = ago.toUpperCase();
      }
    }

    // --- Map ---
    if (routeLine) map.removeLayer(routeLine);
    var routeCoords = waypoints.map(function(w) { return [w.lat, w.lon]; });
    routeLine = L.polyline(routeCoords, {
      color: '#2a3a5c', weight: 2, dashArray: '8 6', opacity: 0.7,
    }).addTo(map);

    if (trackLine) map.removeLayer(trackLine);
    if (track.length > 0) {
      var trackCoords = track.map(function(p) { return [p.lat, p.lon]; });
      trackLine = L.polyline(trackCoords, {
        color: '#3b82f6', weight: 3, opacity: 0.9, lineCap: 'round', lineJoin: 'round',
      }).addTo(map);
    }

    if (positionMarker) map.removeLayer(positionMarker);
    positionMarker = L.marker([pos.lat, pos.lon], { icon: getBoatIcon() })
      .addTo(map)
      .bindPopup(
        '<strong>' + formatCoord(pos.lat, 'N', 'S') + ', ' + formatCoord(pos.lon, 'E', 'W') + '</strong><br>' +
        'Speed: ' + stats.speed.current_kmh.toFixed(1) + ' km/h<br>' +
        'Heading: ' + pos.heading.toFixed(0) + '\u00B0 ' + pos.heading_compass
      );

    waypointMarkers.forEach(function(m) { map.removeLayer(m); });
    waypointMarkers = waypoints.map(function(w) {
      return L.marker([w.lat, w.lon], { icon: waypointIcon(w.name) }).addTo(map);
    });

    // Only fit bounds on first load so user can zoom/pan freely
    if (!initialBoundsFit) {
      var allCoords = routeCoords.slice();
      if (track.length > 0) allCoords.push([pos.lat, pos.lon]);
      if (allCoords.length > 1) {
        map.fitBounds(L.latLngBounds(allCoords).pad(0.1));
      }
      initialBoundsFit = true;
    }

    // --- Messages ---
    renderMessages(messages);

    // --- Daily Distance Chart ---
    var daily = stats.daily_distances;
    if (daily.length > 0) {
      var labels = daily.map(function(d) {
        var dt = new Date(d.date + 'T00:00:00Z');
        return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
      });
      var values = daily.map(function(d) { return d.distance_km; });
      initChart(labels, values);
    }
  }

  // --- Safe DOM rendering for messages ---
  function renderMessages(messages) {
    var container = document.getElementById('messages-list');
    // Clear existing content
    while (container.firstChild) {
      container.removeChild(container.firstChild);
    }

    if (messages.length === 0) {
      var noData = document.createElement('div');
      noData.className = 'no-data';
      var icon = document.createElement('div');
      icon.className = 'no-data-icon';
      icon.textContent = '\u2693';
      var text = document.createElement('div');
      text.className = 'no-data-text';
      text.textContent = 'No messages yet';
      var sub = document.createElement('div');
      sub.className = 'no-data-sub';
      sub.textContent = 'Check-ins will appear here once the voyage begins';
      noData.appendChild(icon);
      noData.appendChild(text);
      noData.appendChild(sub);
      container.appendChild(noData);
      return;
    }

    messages.forEach(function(m) {
      var item = document.createElement('div');
      item.className = 'message-item';
      var time = document.createElement('div');
      time.className = 'message-time';
      time.textContent = formatMessageTime(m.timestamp);
      var text = document.createElement('div');
      text.className = 'message-text';
      text.textContent = m.text;
      item.appendChild(time);
      item.appendChild(text);
      container.appendChild(item);
    });
  }

  // --- Helpers ---
  function formatNum(n) {
    return n != null ? n.toLocaleString('en-US', { maximumFractionDigits: 0 }) : '--';
  }

  function formatCoord(val, posDir, negDir) {
    var dir = val >= 0 ? posDir : negDir;
    return Math.abs(val).toFixed(4) + '\u00B0 ' + dir;
  }

  function formatDate(isoStr) {
    var d = new Date(isoStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' }) +
      ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC', hour12: false }) +
      ' UTC';
  }

  function formatMessageTime(ts) {
    var d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' }) +
      ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC', hour12: false }) +
      ' UTC';
  }

  function timeAgo(isoStr) {
    var diff = Date.now() - new Date(isoStr).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + ' min ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // --- Init ---
  fetchData();
  setInterval(fetchData, REFRESH_INTERVAL);

})();
</script>
</body>
</html>
