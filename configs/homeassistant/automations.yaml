# =============================================================================
# THERMOSTAT LOW BATTERY ALERT
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  PURPOSE: Email alert when radiator valve battery drops < 30%           │
# │                                                                         │
# │  WHY 30%?                                                               │
# │  TRVZB valves report battery in 1% steps. At 20% the valve may fail   │
# │  to actuate in cold weather (motor needs more current). 30% gives      │
# │  ~2 weeks warning to order CR2450 replacements.                        │
# │                                                                         │
# │  COOLDOWN: 24 hours per thermostat (once/day is enough nagging)        │
# │                                                                         │
# │  Battery levels as of Feb 2026:                                        │
# │    Study: 91%  │  Bed: 100%  │  Living Inner: 67%  │  Living Outer: 81%│
# └─────────────────────────────────────────────────────────────────────────┘
# =============================================================================

- id: thermostat_low_battery_alert
  alias: "Thermostat Low Battery Alert"
  description: "Alert when any thermostat battery drops below 30%"
  mode: parallel
  max: 4

  trigger:
    - platform: numeric_state
      entity_id: sensor.study_thermostat_battery
      below: 30
    - platform: numeric_state
      entity_id: sensor.bed_thermostat_battery
      below: 30
    - platform: numeric_state
      entity_id: sensor.living_thermostat_inner_battery
      below: 30
    - platform: numeric_state
      entity_id: sensor.living_thermostat_outer_battery
      below: 30

  variables:
    thermostat_names:
      sensor.study_thermostat_battery: "Study"
      sensor.bed_thermostat_battery: "Bedroom"
      sensor.living_thermostat_inner_battery: "Living Inner"
      sensor.living_thermostat_outer_battery: "Living Outer"
    thermostat_name: "{{ thermostat_names.get(trigger.entity_id, trigger.entity_id) }}"
    battery_level: "{{ trigger.to_state.state }}"

  # No cooldown needed: numeric_state trigger only fires once when crossing 30%.
  # Won't re-trigger until battery recovers above 30% and drops again (never
  # happens in practice - battery drain is one-directional on TRVZB valves).

  action:
    # Email only — not urgent, 2 weeks to order CR2450 replacement.
    - service: script.send_alert_email
      data:
        severity: "WARNING"
        title: "Thermostat Low Battery"
        subtitle: "{{ thermostat_name }} — {{ battery_level }}%"
        description: >-
          {{ thermostat_name }} thermostat battery has dropped below 30%. The TRVZB radiator
          valve may fail to actuate in cold weather when battery is low. Replace soon.
        actions: "Order CR2450 replacement battery|Replace battery before it drops below 15%"
        details: >-
          Battery type: CR2450
          Threshold:    30%

          All thermostat levels:
            Study:        {{ states('sensor.study_thermostat_battery') | replace('unavailable', 'OFFLINE') | replace('unknown', '??') }}%
            Bedroom:      {{ states('sensor.bed_thermostat_battery') | replace('unavailable', 'OFFLINE') | replace('unknown', '??') }}%
            Living Inner: {{ states('sensor.living_thermostat_inner_battery') | replace('unavailable', 'OFFLINE') | replace('unknown', '??') }}%
            Living Outer: {{ states('sensor.living_thermostat_outer_battery') | replace('unavailable', 'OFFLINE') | replace('unknown', '??') }}%
        plain_text: >-
          {{ thermostat_name }} thermostat battery at {{ battery_level }}%. Battery type: CR2450.
          Order replacement before valve stops actuating.
    - service: system_log.write
      data:
        message: "LOW BATTERY: {{ thermostat_name }} thermostat at {{ battery_level }}%"
        level: warning

# =============================================================================
# ANOMALOUS SETPOINT GUARD
# =============================================================================
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  INCIDENT: Feb 9, 2026 — Living Inner TRV at 4°C setpoint in heat mode    │
# │                                                                             │
# │  Resume automation sent set_temperature(19°C) while TRV was offline.       │
# │  Zigbee delivered set_hvac_mode(heat) 2 hours later, but set_temperature   │
# │  was lost. TRV entered heat mode with firmware minimum (4°C).              │
# │                                                                             │
# │  ┌──────────────────┬────────────────────────────────────────────────────┐ │
# │  │ Existing Safety  │ Why It Missed                                      │ │
# │  ├──────────────────┼────────────────────────────────────────────────────┤ │
# │  │ Zombie recovery  │ Only catches mode=OFF — this was heat             │ │
# │  │ Stuck-idle       │ Needs deficit ≥ 2°C — deficit was -14°C           │ │
# │  │ Energy cap       │ Only fires when setpoint > 19°C                   │ │
# │  └──────────────────┴────────────────────────────────────────────────────┘ │
# │                                                                             │
# │  THIS AUTOMATION fills the gap: catches setpoint < 10°C in heat mode.     │
# │  Threshold 10°C: 6°C below lowest legitimate setting (16°C schedule).     │
# │  Catches firmware defaults (4°C min_temp, 7°C frost protection).          │
# │                                                                             │
# │  ANTI-LOOP: Restores to ~19°C → energy cap may fire → sets to 19°C →     │
# │  19°C > 10°C → guard does NOT re-fire. No loop possible.                  │
# │                                                                             │
# │  30s COOLDOWN after guard flag changes: avoids racing with resume          │
# │  automation which briefly has a transient 4°C before set_temperature.      │
# └─────────────────────────────────────────────────────────────────────────────┘
- id: anomalous_setpoint_guard
  alias: "Anomalous Setpoint Guard (< 10°C in heat mode)"
  description: >
    Detects and corrects TRVs with anomalously low setpoints (< 10°C) while in
    heat mode. Caused by set_temperature command dropped during resume when TRV
    was temporarily offline. Layer 1 defense (instant + /10 fallback).
  mode: parallel
  max: 4

  trigger:
    # Trigger A: Setpoint attribute changes (instant detection)
    - platform: state
      entity_id:
        - climate.study_thermostat
        - climate.living_thermostat_inner
        - climate.living_thermostat_outer
        - climate.bed_thermostat
      attribute: temperature
      id: setpoint_change

    # Trigger B: Periodic fallback (catches HA restart, missed events)
    - platform: time_pattern
      minutes: "/10"
      id: periodic_check

  variables:
    anomalous_threshold: 10
    saved_temp_map:
      climate.study_thermostat: "input_number.study_heater_saved_temp"
      climate.living_thermostat_inner: "input_number.living_inner_heater_saved_temp"
      climate.living_thermostat_outer: "input_number.living_outer_heater_saved_temp"
      climate.bed_thermostat: "input_number.bedroom_heater_saved_temp"
    name_map:
      climate.study_thermostat: "Study"
      climate.living_thermostat_inner: "Living Inner"
      climate.living_thermostat_outer: "Living Outer"
      climate.bed_thermostat: "Bedroom"
    mqtt_topic_map:
      climate.study_thermostat: "zigbee2mqtt/[Study] Thermostat/set"
      climate.living_thermostat_inner: "zigbee2mqtt/[Living] Thermostat Inner/set"
      climate.living_thermostat_outer: "zigbee2mqtt/[Living] Thermostat Outer/set"
      climate.bed_thermostat: "zigbee2mqtt/[Bed] Thermostat/set"

  condition:
    # Guard flags must be OFF (intentional shutoff → let resume handle it)
    - condition: state
      entity_id: input_boolean.heaters_off_due_to_window
      state: "off"
    - condition: state
      entity_id: input_boolean.heaters_off_due_to_co2
      state: "off"
    # 30s cooldown after guard flag changes (avoid racing with resume)
    - condition: template
      value_template: >
        {{ (as_timestamp(now()) - as_timestamp(states.input_boolean.heaters_off_due_to_window.last_changed)) > 30
           and (as_timestamp(now()) - as_timestamp(states.input_boolean.heaters_off_due_to_co2.last_changed)) > 30 }}

  action:
    # For setpoint_change: check only the triggering entity
    # For periodic_check: check all thermostats
    - variables:
        entities_to_check: >
          {% if trigger.id == 'setpoint_change' %}
            {{ [trigger.entity_id] }}
          {% else %}
            {{ ['climate.study_thermostat', 'climate.living_thermostat_inner',
                'climate.living_thermostat_outer', 'climate.bed_thermostat'] }}
          {% endif %}

    - repeat:
        for_each: "{{ entities_to_check }}"
        sequence:
          - variables:
              entity: "{{ repeat.item }}"
              hvac_mode: "{{ states(entity) }}"
              setpoint: "{{ state_attr(entity, 'temperature') | float(20) }}"
              current_temp: "{{ state_attr(entity, 'current_temperature') | float(0) }}"
              heater_name: "{{ name_map.get(entity, entity) }}"
              saved_temp_entity: "{{ saved_temp_map.get(entity, '') }}"
              saved_temp: "{{ states(saved_temp_entity) | float(18) if saved_temp_entity else 18 }}"
              restore_temp: "{{ saved_temp if saved_temp | float >= anomalous_threshold else 18 }}"
              mqtt_topic: "{{ mqtt_topic_map.get(entity, '') }}"

          - if:
              - condition: template
                value_template: >
                  {{ hvac_mode == 'heat' and setpoint | float < anomalous_threshold }}
            then:
              # Clear open_window flag (might be stuck from off→heat transition)
              - if:
                  - condition: template
                    value_template: "{{ mqtt_topic != '' }}"
                then:
                  - service: mqtt.publish
                    data:
                      topic: "{{ mqtt_topic }}"
                      payload: '{"open_window": "OFF"}'
                      retain: true

              # Restore setpoint from saved temp
              - service: climate.set_temperature
                target:
                  entity_id: "{{ entity }}"
                data:
                  temperature: "{{ restore_temp }}"

              # Log to InfluxDB
              - service: influxdb.write
                data:
                  measurement: thermostat_events
                  tags:
                    event_type: anomalous_setpoint_corrected
                  fields:
                    thermostat: "{{ heater_name }}"
                    anomalous_setpoint: "{{ setpoint }}"
                    restored_to: "{{ restore_temp }}"
                    trigger: "{{ trigger.id }}"

              # Phone notification
              - service: notify.all_phones
                data:
                  title: "🛡️ Anomalous Setpoint Corrected"
                  message: >
                    {{ heater_name }}: was {{ setpoint }}°C in heat mode!
                    Restored to {{ restore_temp }}°C (room: {{ current_temp }}°C).
                    Cause: set_temperature likely dropped during resume.
                  data:
                    channel: "Warning"
                    importance: high
                    tag: "anomalous_setpoint_{{ entity }}"

              # Email (paper trail)
              - service: script.send_alert_email
                data:
                  severity: "WARNING"
                  title: "Anomalous Setpoint Corrected"
                  subtitle: "{{ heater_name }}"
                  description: >-
                    TRV {{ heater_name }} was in heat mode with setpoint {{ setpoint }}°C
                    (below {{ anomalous_threshold }}°C threshold). Restored to {{ restore_temp }}°C
                    from saved temp helper. Trigger: {{ trigger.id }}.
                  actions: "Verify TRV is heating correctly|Check resume automation logs"
                  details: >-
                    Entity: {{ entity }}
                    Anomalous setpoint: {{ setpoint }}°C
                    Restored to: {{ restore_temp }}°C
                    Saved temp helper: {{ saved_temp }}°C
                    Room temp: {{ current_temp }}°C
                  plain_text: >-
                    {{ heater_name }} TRV anomalous setpoint corrected: {{ setpoint }}°C → {{ restore_temp }}°C.
                    Room temp: {{ current_temp }}°C. Trigger: {{ trigger.id }}.

# ─── ANOMALOUS SETPOINT GUARD — STARTUP CHECK ───
# On HA startup, entities settle slowly. Wait 30s then trigger the main guard.
- id: anomalous_setpoint_guard_startup
  alias: "Anomalous Setpoint Guard - Startup Check"
  description: "On HA startup, check for anomalous setpoints from while HA was down"
  mode: single

  trigger:
    - platform: homeassistant
      event: start

  action:
    - delay:
        seconds: 30
    - service: automation.trigger
      target:
        entity_id: automation.anomalous_setpoint_guard

# ─── OUTDOOR TEMPERATURE-BASED SETPOINT ADJUSTMENT ───
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  Adjusts TRV setpoints based on outdoor temperature to save energy.        │
# │                                                                             │
# │  Outdoor > 10°C  →  16°C                                                   │
# │  Outdoor 5-10°C  →  17°C                                                   │
# │  Outdoor < 5°C   →  18°C                                                   │
# │                                                                             │
# │  MANUAL OVERRIDE: Threshold crossings always enforce. Periodic checks      │
# │  skip TRVs with setpoint > target (assumes manual raise). Override lasts   │
# │  until the next real threshold crossing.                                    │
# │                                                                             │
# │  INTERACTIONS:                                                              │
# │    - Boost: skipped (per-TRV and global)                                   │
# │    - Night mode: bedroom skipped when active                                │
# │    - Window/CO2 guard: skipped (heaters already off)                       │
# │    - Energy cap: safe (our max 18 < cap's 19)                              │
# │    - Anomalous guard: safe (our min 16 > guard's 10)                       │
# │    - Saved temps: updated so resume automations stay consistent             │
# └─────────────────────────────────────────────────────────────────────────────┘
- id: outdoor_temp_adjust_setpoints
  alias: "Outdoor Temp - Adjust TRV Setpoints"
  description: >
    Adjusts TRV setpoints based on outdoor temperature thresholds.
    >10°C: 16°C, 5-10°C: 17°C, <5°C: 18°C.
    Updates saved temp helpers so resume automations use correct values.
  mode: single

  trigger:
    # Threshold crossings (instant detection)
    - platform: numeric_state
      entity_id: sensor.balcony_temperature_humidity_temperature
      above: 10
      id: threshold_cross
    - platform: numeric_state
      entity_id: sensor.balcony_temperature_humidity_temperature
      below: 10
      id: threshold_cross
    - platform: numeric_state
      entity_id: sensor.balcony_temperature_humidity_temperature
      above: 5
      id: threshold_cross
    - platform: numeric_state
      entity_id: sensor.balcony_temperature_humidity_temperature
      below: 5
      id: threshold_cross
    # Periodic fallback (HA restart, gradual drift)
    - platform: time_pattern
      minutes: "/30"
      id: periodic_check
    # Startup check
    - platform: homeassistant
      event: start
      id: ha_startup

  condition:
    # Don't adjust if heaters are off due to window or CO2
    - condition: state
      entity_id: input_boolean.heaters_off_due_to_window
      state: "off"
    - condition: state
      entity_id: input_boolean.heaters_off_due_to_co2
      state: "off"
    # Guard flag cooldown (30s) - avoid racing with resume automations
    - condition: template
      value_template: >
        {{ (as_timestamp(now()) - as_timestamp(states.input_boolean.heaters_off_due_to_window.last_changed)) > 30
           and (as_timestamp(now()) - as_timestamp(states.input_boolean.heaters_off_due_to_co2.last_changed)) > 30 }}

  variables:
    outdoor_temp: "{{ states('sensor.balcony_temperature_humidity_temperature') | float(-999) }}"
    target_setpoint: >
      {% if outdoor_temp == -999 %}
        18
      {% elif outdoor_temp > 10 %}
        16
      {% elif outdoor_temp >= 5 %}
        17
      {% else %}
        18
      {% endif %}
    is_threshold_cross: "{{ trigger.id == 'threshold_cross' }}"

  action:
    # Delay on HA startup for entities to settle
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'ha_startup' }}"
      then:
        - delay:
            seconds: 45

    # Skip if sensor unavailable
    - condition: template
      value_template: "{{ outdoor_temp != -999 }}"

    # Per-TRV adjustment loop
    - repeat:
        for_each:
          - entity_id: climate.study_thermostat
            saved_temp: input_number.study_heater_saved_temp
            name: Study
            boost_end: input_datetime.study_boost_end
          - entity_id: climate.living_thermostat_inner
            saved_temp: input_number.living_inner_heater_saved_temp
            name: Living Inner
            boost_end: input_datetime.living_inner_boost_end
          - entity_id: climate.living_thermostat_outer
            saved_temp: input_number.living_outer_heater_saved_temp
            name: Living Outer
            boost_end: input_datetime.living_outer_boost_end
          - entity_id: climate.bed_thermostat
            saved_temp: input_number.bedroom_heater_saved_temp
            name: Bedroom
            boost_end: input_datetime.bedroom_boost_end
        sequence:
          - variables:
              entity: "{{ repeat.item.entity_id }}"
              trv_name: "{{ repeat.item.name }}"
              current_setpoint: "{{ state_attr(entity, 'temperature') | float(0) }}"
              is_heat_mode: "{{ states(entity) == 'heat' }}"
              # Skip bedroom during night mode
              is_night_mode: >
                {{ entity == 'climate.bed_thermostat'
                   and is_state('input_boolean.bedroom_night_mode_active', 'on') }}
              # Skip if per-TRV boost is active
              is_boosted: >
                {% set be = states(repeat.item.boost_end) %}
                {{ be not in ['unknown', 'unavailable', '']
                   and as_timestamp(be) > as_timestamp(now()) }}
              # Skip if global boost is active
              is_global_boosted: >
                {% set gbe = states('input_datetime.global_boost_end') %}
                {{ gbe not in ['unknown', 'unavailable', '']
                   and as_timestamp(gbe) > as_timestamp(now()) }}
          # MANUAL OVERRIDE RESPECT:
          #   Threshold crossings: always enforce the new target
          #   Periodic/startup: only act if current setpoint is a known automation value
          #   (16, 17, 18) - not a manual override like 20 or 22.
          #   This way: HA restart re-applies the rule, but manual raises are preserved.
          - if:
              - condition: template
                value_template: >
                  {% set known_auto_setpoints = [16, 17, 18] %}
                  {{ is_heat_mode
                     and not is_night_mode
                     and not is_boosted
                     and not is_global_boosted
                     and current_setpoint > target_setpoint | float
                     and (is_threshold_cross or current_setpoint | float in known_auto_setpoints) }}
            then:
              - service: climate.set_temperature
                target:
                  entity_id: "{{ entity }}"
                data:
                  temperature: "{{ target_setpoint | float }}"
              # Update saved temp helper so resume automations stay consistent
              - service: input_number.set_value
                target:
                  entity_id: "{{ repeat.item.saved_temp }}"
                data:
                  value: "{{ target_setpoint | float }}"

# -----------------------------------------------------------------------------
# GOOGLE ASSISTANT INTEGRATION ERROR ALERT
# Trigger:   Any ERROR-level log line from google_assistant.*
# Rate:      Max 1 email per 24h (throttled via input_datetime.google_assistant_alert_last)
# Context:   Added 2026-04-18 after audit found ~11 silent 404s/day on
#            reportStateAndNotification that accumulated unnoticed for days.
#            Root cause was entities exposed to Google that had no device
#            trait mapping (occupancy/vibration binary_sensors). Future
#            drift of the same shape is caught instantly.
# -----------------------------------------------------------------------------
- id: google_assistant_integration_error
  alias: "Google Assistant Integration Error"
  description: "Email on any google_assistant ERROR log entry (throttled 1/day)"
  mode: single

  trigger:
    - platform: event
      event_type: system_log_event
      event_data:
        level: ERROR

  condition:
    # Filter: only google_assistant logger lines
    - condition: template
      value_template: >-
        {{ 'google_assistant' in (trigger.event.data.name | default('')) }}
    # Throttle: sentinel 1970-01-01 = never-sent; otherwise need > 24h gap
    - condition: template
      value_template: >-
        {% set last = states('input_datetime.google_assistant_alert_last') %}
        {% if last in ['unknown', 'unavailable', ''] %}
          true
        {% else %}
          {% set ts = as_timestamp(last) | default(0) %}
          {{ ts < 86400 or (as_timestamp(now()) - ts) > 86400 }}
        {% endif %}

  action:
    # Stamp the throttle timer BEFORE sending (fail-safe: even if email fails,
    # we don't spam on subsequent errors in the same 24h).
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.google_assistant_alert_last
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - service: script.send_alert_email
      data:
        severity: "WARNING"
        title: "Google Assistant Integration Error"
        subtitle: "HomeGraph rejecting state reports"
        description: >-
          Home Assistant is hitting errors from Google's HomeGraph API. Most
          common cause is an entity exposed to Google that has no matching
          device trait (e.g. binary_sensor with device_class=occupancy /
          vibration / motion). Other causes: account unlinked in Google
          Home app, cloudflared tunnel down, service account key expired.
        actions: >-
          Check docker logs homeassistant | grep google_assistant|Review
          entity_config in configs/homeassistant/configuration.yaml|Verify
          https://ha.sivaa.in returns HTTP 405 (webhook alive)|See trait
          mapping table in configs/homeassistant/CLAUDE.md
        details: >-
          Logger:  {{ trigger.event.data.name }}
          Level:   {{ trigger.event.data.level }}
          Message: {{ trigger.event.data.message | default('(no message)') }}
          Time:    {{ trigger.event.data.timestamp | default(now().isoformat()) }}

          This alert is rate-limited to 1 email per 24h.
        plain_text: >-
          Google Assistant integration error:
          {{ trigger.event.data.message | default('(no message)') }}
