homeassistant:
  name: Home
  unit_system: metric
  time_zone: Europe/Berlin
  internal_url: "http://pi:8123"
  external_url: "https://ha.sivaa.in"
  customize:
    media_player.broken_display:
      friendly_name: "Broken Display"

frontend:
config:
mobile_app:
sun:  # Required for sun.sun entity (sunrise/sunset tracking)

# =============================================================================
# NOTIFICATION GROUPS
# Purpose: Send mobile push notifications
# Phones:
#   - mobile_app_nithya_mobile (Nithya)
#   Siva removed Feb 2026 — prefers email-only (siva@sivaa.net)
# =============================================================================
notify:
  - platform: group
    name: all_phones
    services:
      - action: mobile_app_nithya_mobile

  # =========================================================================
  # EMAIL NOTIFICATIONS (Gmail SMTP)
  # ┌─────────────────────────────────────────────────────────────────────┐
  # │  PURPOSE: Send email alerts for critical events                     │
  # │                                                                     │
  # │  Automation ──► notify.all_phones  (Nithya mobile push)            │
  # │              └► notify.email       (Siva email paper trail)        │
  # │                                                                     │
  # │  WHY EMAIL + PHONE?                                                │
  # │  Phone notifications vanish when dismissed. Emails persist.         │
  # │  If your phone dies at 3 AM and CO2 hits critical,                 │
  # │  the email is waiting when you wake up.                            │
  # │                                                                     │
  # │  SETUP: zoobave@gmail.com needs an App Password                    │
  # │         (Google Account → Security → App Passwords)                │
  # │  CREDS: !secret gmail_app_password in secrets.yaml                 │
  # └─────────────────────────────────────────────────────────────────────┘
  # =========================================================================
  - platform: smtp
    name: email
    server: smtp.gmail.com
    port: 587
    encryption: starttls
    sender: zoobave@gmail.com
    username: zoobave@gmail.com
    password: !secret gmail_app_password
    recipient:
      - siva@sivaa.net
    sender_name: "Pi Home Assistant"

http:
  server_port: 8123
  use_x_forwarded_for: true
  cors_allowed_origins:
    - http://localhost:8888
    - http://127.0.0.1:8888
    - http://pi:8888
  trusted_proxies:
    # Local/Docker
    - 127.0.0.1
    - ::1
    - 172.16.0.0/12
    # Cloudflare IPv4 ranges
    - 173.245.48.0/20
    - 103.21.244.0/22
    - 103.22.200.0/22
    - 103.31.4.0/22
    - 141.101.64.0/18
    - 108.162.192.0/18
    - 190.93.240.0/20
    - 188.114.96.0/20
    - 197.234.240.0/22
    - 198.41.128.0/17
    - 162.158.0.0/15
    - 104.16.0.0/13
    - 104.24.0.0/14
    - 172.64.0.0/13
    - 131.0.72.0/22
    # Cloudflare IPv6 ranges
    - 2400:cb00::/32
    - 2606:4700::/32
    - 2803:f800::/32
    - 2405:b500::/32
    - 2405:8100::/32
    - 2a06:98c0::/29
    - 2c0f:f248::/32

# MQTT - Configured via UI integration (Settings > Devices & Services > MQTT)
# VPN provides network security - no MQTT authentication needed
# broker: localhost, port: 1883 (must use localhost, not Docker hostname, with --network host)

# InfluxDB integration - writes sensor data directly
# NOTE: Must use localhost, not "influxdb" Docker hostname, when HA uses --network host
influxdb:
  host: localhost
  port: 8086
  database: homeassistant
  default_measurement: state
  include:
    entity_globs:
      - sensor.*temperature*
      - sensor.*humidity*
      - sensor.*battery*
      - sensor.*co2*
      - sensor.*air_quality*
      - binary_sensor.hot_water_running
      - sensor.hot_water_*

# Recorder for local history
recorder:
  purge_keep_days: 7
  commit_interval: 60
  include:
    entity_globs:
      - sensor.*temperature*
      - sensor.*humidity*
      - sensor.*co2*
      - sensor.*air_quality*
      - media_player.*  # Track Cast device availability for TTS debugging
      - binary_sensor.hot_water_running
      - sensor.hot_water_*

logger:
  default: warning
  logs:
    homeassistant.components.influxdb: info
    homeassistant.components.google_assistant: info
    homeassistant.components.automation: info
    homeassistant.components.tts: info

# =============================================================================
# MEDIA SOURCE (Required for TTS)
# =============================================================================
media_source:

# =============================================================================
# LG WEBOS TV
# ┌─────────────────────────────────────────────────────────────────┐
# │  Model: LG 65SM8500PLA (webOS 4.5)                             │
# │  IP: 192.168.0.168 │ MAC: f0:86:20:a6:12:f0                    │
# │                                                                 │
# │  How it works:                                                  │
# │    ┌──────────┐  webOS API   ┌──────┐  WoL magic pkt  ┌──────┐ │
# │    │   HA     │────────────→ │  TV  │ ←──────────────  │  HA  │ │
# │    │ (control)│  (off/vol/…) │      │   (wake from     │(turn │ │
# │    └──────────┘              └──────┘    standby)       │ on)  │ │
# │                                                        └──────┘ │
# │  Setup: UI only (Settings → Devices → Add → LG webOS)          │
# │  First run: Accept pairing prompt on TV screen (one-time)       │
# │  Voice: "Hey Google, turn on/off the TV"                        │
# │                                                                 │
# │  NOTE: webostv integration does NOT support YAML config.        │
# │  Configure via: Settings → Devices & Services → Add → LG webOS │
# │  Turn-on via WoL: configure in integration options after adding │
# └─────────────────────────────────────────────────────────────────┘
# =============================================================================

# Wake-on-LAN: Required for turning on the TV from standby
# The webOS integration (added via UI) uses this to send magic packets
wake_on_lan:

# =============================================================================
# TEXT-TO-SPEECH (TTS)
# Purpose: Voice announcements via Google Home speakers
# Docs: https://www.home-assistant.io/integrations/google_translate/
# =============================================================================
tts:
  - platform: google_translate
    language: 'en'

# =============================================================================
# GOOGLE ASSISTANT INTEGRATION
# Purpose: Voice control via Google Home devices
# Docs: https://www.home-assistant.io/integrations/google_assistant/
# =============================================================================
google_assistant:
  project_id: siva-home-assistant-1
  service_account: !include SERVICE_ACCOUNT.json
  report_state: true
  expose_by_default: false
  exposed_domains:
    - light
    - switch
    - sensor
    - climate
    - binary_sensor
    - media_player
    - script
  entity_config:
    # === LIGHTS (Voice controllable) ===
    light.study_ikea_light:
      name: "Study Light"
      expose: true
      room: "Study"
      aliases:
        - "Office Light"
        - "Study Room Light"

    light.living_ikea_light:
      name: "Living Room Light"
      expose: true
      room: "Living Room"
      aliases:
        - "Lounge Light"
        - "Main Light"

    light.bath_light:
      name: "Bath Light"
      expose: true
      room: "Bathroom"
      aliases:
        - "Bathroom Light"

    # EGLO Rovito-Z 900087 — single entity, dual LEDs (main ring + backlight).
    # Google maps: color_temp cmd → main ring, hue/sat cmd → backlight
    # (see root CLAUDE.md lesson 2026-04-15). "Bedroom Backlight" switch below
    # gives explicit backlight on/off without affecting main ring.
    light.bed_light:
      name: "Bedroom Light"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bed Light"
        - "Master Bedroom Light"

    # Aqara T1M endpoint 1 — white ring (CCT). Primary ceiling light.
    light.hallway_light:
      name: "Hallway Light"
      expose: true
      room: "Hallway"
      aliases:
        - "Corridor Light"
        - "Entry Light"

    # Aqara T1M endpoint 2 — RGB side strip (rim/edge accent).
    light.hallway_side_light:
      name: "Hallway Side Light"
      expose: true
      room: "Hallway"
      aliases:
        - "Hallway Accent"
        - "Hallway Strip"
        - "Corridor Accent"

    # === BACKLIGHT CONTROL SWITCH (Voice workaround) ===
    # Google Home can't target the EGLO Rovito-Z backlight independently
    # because both LEDs live on one light entity. This template switch
    # sends {color:{x:0,y:0}} on OFF to power down backlight LEDs only
    # (main ring preserved), and restores saved hue/sat on ON.
    switch.bed_backlight:
      name: "Bedroom Backlight"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bed Backlight"
        - "Bedroom Back Light"

    # === BACKLIGHT COLOR PRESETS (scripts, exposed as scenes) ===
    # Each script publishes {color:{hue,saturation}} directly to MQTT,
    # bypassing HA's hs_color→xy conversion so HA's color_mode stays
    # consistent with the main ring being CCT. Voice invocation pattern:
    #   "Hey Google, activate bedroom backlight red"
    script.bed_backlight_red:
      name: "Bedroom Backlight Red"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bed Backlight Red"
    script.bed_backlight_orange:
      name: "Bedroom Backlight Orange"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bed Backlight Orange"
        - "Bedroom Backlight Amber"
    script.bed_backlight_green:
      name: "Bedroom Backlight Green"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bed Backlight Green"
    script.bed_backlight_blue:
      name: "Bedroom Backlight Blue"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bed Backlight Blue"
    script.bed_backlight_purple:
      name: "Bedroom Backlight Purple"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bed Backlight Purple"
        - "Bedroom Backlight Violet"
    script.bed_backlight_pink:
      name: "Bedroom Backlight Pink"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bed Backlight Pink"
        - "Bedroom Backlight Magenta"

    # === SMART PLUG (Voice controllable) ===
    switch.smart_plug_1:
      name: "Smart Plug"
      expose: true
      room: "Living Room"
      aliases:
        - "Plug"
        - "Power Plug"

    # === LIGHT SWITCHES (Voice controllable) ===
    switch.study_light_switch:
      name: "Study Switch"
      expose: true
      room: "Study"
      aliases:
        - "Study Light Switch"
        - "Office Switch"

    switch.bed_light_switch:
      name: "Bedroom Switch"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bedroom Light Switch"
        - "Bed Switch"

    switch.living_light_switch:
      name: "Living Room Switch"
      expose: true
      room: "Living Room"
      aliases:
        - "Living Light Switch"
        - "Lounge Switch"

    # === FINGERBOT (Voice controllable) ===
    switch.fingerbot:
      name: "Fingerbot"
      expose: true
      room: "Hallway"
      aliases:
        - "Button Pusher"
        - "Robot Button"

    # === LG TV (Voice controllable) ===
    # Expose the template switch, NOT the raw media_player
    # media_player goes "unavailable" when TV is off → Google blocks commands
    # The switch always reports on/off → Google always forwards commands
    switch.living_room_tv_power:
      name: "Living Room TV"
      expose: true
      room: "Living Room"
      aliases:
        - "TV"
        - "Television"
    media_player.living_room_tv:
      expose: false

    # === TEMPERATURE SENSORS (Read-only, queryable) ===
    sensor.study_temperature_humidity_temperature:
      name: "Study Temperature"
      expose: true
      room: "Study"

    sensor.living_temperature_humidity_temperature:
      name: "Living Room Temperature"
      expose: true
      room: "Living Room"

    sensor.bed_temperature_humidity_sensor_temperature:
      name: "Bedroom Temperature"
      expose: true
      room: "Bedroom"

    sensor.kitchen_temperature_humidity_temperature:
      name: "Kitchen Temperature"
      expose: true
      room: "Kitchen"

    sensor.bath_temperature_humidity_temperature:
      name: "Bathroom Temperature"
      expose: true
      room: "Bathroom"

    sensor.balcony_temperature_humidity_temperature:
      name: "Balcony Temperature"
      expose: true
      room: "Balcony"

    # === HUMIDITY SENSORS ===
    sensor.study_temperature_humidity_humidity:
      name: "Study Humidity"
      expose: true
      room: "Study"

    sensor.living_temperature_humidity_humidity:
      name: "Living Room Humidity"
      expose: true
      room: "Living Room"

    sensor.bed_temperature_humidity_sensor_humidity:
      name: "Bedroom Humidity"
      expose: true
      room: "Bedroom"

    # === CO2 SENSOR ===
    sensor.hallway_co2_co2:
      name: "Air Quality"
      expose: true
      room: "Hallway"
      aliases:
        - "CO2 Sensor"
        - "Air Quality Sensor"

    # === MOTION SENSOR (Mailbox) ===
    # Google has no trait for device_class=occupancy/motion, so SYNC
    # silently drops this but report_state still 404s on every state change.
    # Kept in entity_config (aliases preserved) but expose:false to stop noise.
    binary_sensor.mailbox_motion_sensor_occupancy:
      name: "Mailbox Sensor"
      expose: false
      room: "Entry"
      aliases:
        - "Mail Sensor"

    # === THERMOSTATS (Climate control) ===
    climate.study_thermostat:
      name: "Study Thermostat"
      expose: true
      room: "Study"
      aliases:
        - "Study Heater"
        - "Office Thermostat"

    climate.living_thermostat_inner:
      name: "Living Inner"
      expose: true
      room: "Living Room"
      aliases:
        - "Living Inner Thermostat"
        - "Living Inner Heater"

    climate.living_thermostat_outer:
      name: "Living Outer"
      expose: true
      room: "Living Room"
      aliases:
        - "Living Outer Thermostat"
        - "Living Outer Heater"

    climate.bed_thermostat:
      name: "Bedroom Thermostat"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bedroom Heater"
        - "Bed Heater"

    # === ADDITIONAL SMART PLUGS (Voice controllable) ===
    switch.smart_plug_2:
      name: "Smart Plug 2"
      expose: true
      room: "Kitchen"
      aliases:
        - "Kitchen Plug"
        - "Plug Two"

    switch.smart_plug_3:
      name: "Smart Plug 3"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bedroom Plug"
        - "Plug Three"

    # === PRESENCE SENSOR ===
    # Removed 2026-04-18: stale entity_id. The real presence sensors are
    # per-room (binary_sensor.{study,living,kitchen,bath,bed}_human_presence_occupancy).
    # Not re-added per-room because device_class=occupancy has no Google trait
    # mapping (same as mailbox above).

    # === VIBRATION SENSOR - Hot Water ===
    # device_class=vibration has no Google trait mapping, same failure mode as
    # mailbox above. Exposed as false to stop report_state 404s.
    binary_sensor.vibration_sensor_vibration:
      name: "Hot Water Sensor"
      expose: false
      room: "Bathroom"
      aliases:
        - "Vibration Sensor"
        - "Water Running"

    # === ADDITIONAL HUMIDITY SENSORS ===
    sensor.kitchen_temperature_humidity_humidity:
      name: "Kitchen Humidity"
      expose: true
      room: "Kitchen"

    sensor.bath_temperature_humidity_humidity:
      name: "Bathroom Humidity"
      expose: true
      room: "Bathroom"

    sensor.balcony_temperature_humidity_humidity:
      name: "Balcony Humidity"
      expose: true
      room: "Balcony"

    # === WINDOW/DOOR CONTACT SENSORS (Queryable) ===
    binary_sensor.study_window_contact_sensor_large_contact:
      name: "Study Large Window"
      expose: true
      room: "Study"
      aliases:
        - "Study Big Window"
        - "Office Window"

    binary_sensor.study_window_contact_sensor_small_contact:
      name: "Study Small Window"
      expose: true
      room: "Study"
      aliases:
        - "Study Little Window"

    binary_sensor.living_window_contact_sensor_window_contact:
      name: "Living Room Window"
      expose: true
      room: "Living Room"
      aliases:
        - "Lounge Window"

    binary_sensor.living_window_contact_sensor_balcony_door_contact:
      name: "Balcony Door"
      expose: true
      room: "Living Room"
      aliases:
        - "Living Balcony Door"

    binary_sensor.bed_window_contact_sensor_contact:
      name: "Bedroom Window"
      expose: true
      room: "Bedroom"
      aliases:
        - "Bed Window"

    binary_sensor.kitchen_window_contact_sensor_contact:
      name: "Kitchen Window"
      expose: true
      room: "Kitchen"

    binary_sensor.bath_window_contact_sensor_contact:
      name: "Bathroom Window"
      expose: true
      room: "Bathroom"
      aliases:
        - "Bath Window"

    binary_sensor.hallway_window_contact_sensor_main_door_contact:
      name: "Front Door"
      expose: true
      room: "Entry"
      aliases:
        - "Main Door"
        - "Entry Door"

# =============================================================================
# WEATHER INTEGRATION
# Purpose: Official weather forecast for Zehlendorf, Berlin (used in dashboard header)
# Docs: https://www.home-assistant.io/integrations/met/
# =============================================================================
weather:
  - platform: met
    name: Zehlendorf Weather
    latitude: 52.4319
    longitude: 13.2599

# =============================================================================
# LIGHT GROUPS
# Purpose: Group lights for easier control and scalability
# =============================================================================
light:
  - platform: group
    name: "IKEA Lights"
    unique_id: ikea_lights_group
    entities:
      - light.study_ikea_light
      - light.living_ikea_light

# =============================================================================
# INPUT BOOLEANS - State Memory for Automations
# Purpose: Remember heater states before window-triggered shutoff
# =============================================================================
input_boolean:
  # NOTE: No 'initial:' - state preserved across HA restarts
  study_heater_was_on:
    name: Study Heater Was On
  living_inner_heater_was_on:
    name: Living Inner Heater Was On
  living_outer_heater_was_on:
    name: Living Outer Heater Was On
  bedroom_heater_was_on:
    name: Bedroom Heater Was On
  # Guard flag to prevent state overwrite when multiple windows open
  heaters_off_due_to_window:
    name: Heaters Off Due To Window
    icon: mdi:window-open-variant
  # Guard flag for CO2-triggered heater shutoff
  heaters_off_due_to_co2:
    name: Heaters Off Due To CO2
    icon: mdi:molecule-co2
  # CO2 override flag (allows heaters when CO2 is high for 6 hours)
  co2_override_active:
    name: CO2 Override Active
    icon: mdi:shield-off-outline
  # Bedroom night mode flag (23:00-06:00 temperature limit)
  bedroom_night_mode_active:
    name: Bedroom Night Mode Active
    icon: mdi:weather-night
  # =========================================================================
  # CIRCADIAN LIGHTING FLAGS
  # Purpose: Track circadian state and manual overrides for IKEA lights
  # =========================================================================
  circadian_enabled:
    name: Circadian Lighting Enabled
    icon: mdi:brightness-auto
  # Debounce flag - set when automation is actively changing lights
  # Used to distinguish automation changes from manual remote presses
  circadian_automation_active:
    name: Circadian Automation Active
    icon: mdi:sync
  # Per-light override flags
  circadian_study_override:
    name: Study Light Override
    icon: mdi:hand-back-right
  circadian_living_override:
    name: Living Light Override
    icon: mdi:hand-back-right
  circadian_bath_override:
    name: Bath Light Override
    icon: mdi:hand-back-right
  circadian_bed_override:
    name: Bed Light Override
    icon: mdi:hand-back-right
  circadian_hallway_override:
    name: Hallway Light Override
    icon: mdi:hand-back-right
  # =========================================================================
  # BED BACKLIGHT VOICE STATE HOLDER
  # Tracks desired on/off state for the EGLO Rovito-Z backlight LEDs.
  # Drives switch.bed_backlight (template switch below) so Google Home can
  # say "turn off the bedroom backlight" without affecting the main ring.
  # =========================================================================
  bed_backlight_state:
    name: Bed Backlight State
    icon: mdi:led-strip-variant
  # =========================================================================
  # ZIGBEE NETWORK MONITOR (Apr 2026)
  # Tracks whether Z2M itself is reachable. Used as a condition gate by the
  # wildcard offline alert + ghost sweep to suppress per-device alerts when
  # the bridge is the actual problem. Driven by zigbee2mqtt/bridge/state LWT.
  # =========================================================================
  z2m_online:
    name: Z2M Bridge Online
    icon: mdi:lan-connect
    initial: true   # Default to online; bridge/state retained MQTT corrects on startup
  # 30-min grace period after HA start. Suppresses wildcard offline alerts to
  # absorb retained-message replays + give Z2M time to re-ping every device.
  ha_startup_complete:
    name: HA Startup Complete (30-min grace passed)
    icon: mdi:timer-check

# =============================================================================
# INPUT DATETIMES - Override Expiration Timestamps
# Purpose: Track when manual overrides should expire (30 min from trigger)
# =============================================================================
input_datetime:
  circadian_study_override_expires:
    name: Study Override Expires
    has_date: true
    has_time: true
    icon: mdi:timer-sand
  circadian_living_override_expires:
    name: Living Override Expires
    has_date: true
    has_time: true
    icon: mdi:timer-sand
  circadian_bath_override_expires:
    name: Bath Override Expires
    has_date: true
    has_time: true
    icon: mdi:timer-sand
  circadian_bed_override_expires:
    name: Bed Override Expires
    has_date: true
    has_time: true
    icon: mdi:timer-sand
  circadian_hallway_override_expires:
    name: Hallway Override Expires
    has_date: true
    has_time: true
    icon: mdi:timer-sand
  # Bedroom night mode override expiry (for dashboard 90-min override)
  bedroom_night_override_end:
    name: Bedroom Night Override Expires
    has_date: true
    has_time: true
    icon: mdi:timer-sand
  # Thermostat boost expiry times (dashboard 60-min boost feature)
  study_boost_end:
    name: Study Boost Expires
    has_date: true
    has_time: true
    icon: mdi:fire
  living_inner_boost_end:
    name: Living Inner Boost Expires
    has_date: true
    has_time: true
    icon: mdi:fire
  living_outer_boost_end:
    name: Living Outer Boost Expires
    has_date: true
    has_time: true
    icon: mdi:fire
  bedroom_boost_end:
    name: Bedroom Boost Expires
    has_date: true
    has_time: true
    icon: mdi:fire
  # Global boost mode expiry (enables 25°C limit for 60 min)
  global_boost_end:
    name: Global Boost Mode Expires
    has_date: true
    has_time: true
    icon: mdi:fire-alert
  # CO2 override expiry (allows heaters despite high CO2 for 6 hours)
  co2_override_end:
    name: CO2 Override Expires
    has_date: true
    has_time: true
    icon: mdi:shield-off-outline

  # CO2 Episode Tracking - for accurate ventilation time announcements
  # Sentinel value "1970-01-01 00:00:00" means "not tracking"
  co2_high_started:
    name: "CO2 Episode Started"
    has_date: true
    has_time: true
    icon: mdi:molecule-co2
  co2_window_opened:
    name: "CO2 Window Opened"
    has_date: true
    has_time: true
    icon: mdi:window-open

  # =========================================================================
  # STUCK-IDLE RECOVERY — Rate Limiting Windows
  # Purpose: Track when the sliding 1-hour recovery window started per TRV
  # Used by: thermostat_stuck_idle_recovery automation
  # Sentinel "1970-01-01 00:00:00" = no active window (same pattern as CO2)
  # =========================================================================
  study_idle_recovery_window_start:
    name: "Study Idle Recovery Window Start"
    has_date: true
    has_time: true
    icon: mdi:timer-sand
  living_inner_idle_recovery_window_start:
    name: "Living Inner Idle Recovery Window Start"
    has_date: true
    has_time: true
    icon: mdi:timer-sand
  living_outer_idle_recovery_window_start:
    name: "Living Outer Idle Recovery Window Start"
    has_date: true
    has_time: true
    icon: mdi:timer-sand
  bedroom_idle_recovery_window_start:
    name: "Bedroom Idle Recovery Window Start"
    has_date: true
    has_time: true
